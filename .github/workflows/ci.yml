name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: reports/junit.xml
          retention-days: 7

      - name: Check run freshness (fail if triggered more than 1 hour ago)
        run: |
          TRIGGERED_AT="${{ github.event.pull_request.updated_at }}"
          # Fall back to push timestamp for non-PR events
          if [ -z "$TRIGGERED_AT" ]; then
            TRIGGERED_AT="${{ github.event.head_commit.timestamp }}"
          fi
          TRIGGERED_EPOCH=$(date -d "$TRIGGERED_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$TRIGGERED_AT" +%s)
          NOW_EPOCH=$(date +%s)
          AGE=$(( NOW_EPOCH - TRIGGERED_EPOCH ))
          echo "Run age: ${AGE}s"
          if [ "$AGE" -gt 3600 ]; then
            echo "::error::CI run is older than 1 hour (${AGE}s). Push a new commit to trigger a fresh run."
            exit 1
          fi
